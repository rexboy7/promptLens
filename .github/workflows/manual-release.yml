name: Manual Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: true
        default: main
        type: string
      build_windows:
        description: "Build Windows release"
        required: true
        default: true
        type: boolean
      build_macos:
        description: "Build macOS package"
        required: true
        default: true
        type: boolean
      bump:
        description: "Version bump type (Windows release only)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      create_release:
        description: "Create GitHub release (requires Windows release)"
        required: true
        default: true
        type: boolean

jobs:
  windows-release:
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      version: ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version files
        id: bump
        shell: bash
        run: |
          node <<'EOF'
          const fs = require("node:fs");

          const bumpType = process.env.BUMP_TYPE;
          const inc = (version, type) => {
            const parts = version.split(".").map((x) => parseInt(x, 10));
            if (parts.length !== 3 || parts.some((x) => Number.isNaN(x))) {
              throw new Error(`Invalid semver: ${version}`);
            }
            if (type === "major") return `${parts[0] + 1}.0.0`;
            if (type === "minor") return `${parts[0]}.${parts[1] + 1}.0`;
            return `${parts[0]}.${parts[1]}.${parts[2] + 1}`;
          };

          const pkgPath = "package.json";
          const tauriConfPath = "src-tauri/tauri.conf.json";
          const cargoTomlPath = "src-tauri/Cargo.toml";

          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          const nextVersion = inc(pkg.version, bumpType);
          pkg.version = nextVersion;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");

          const tauriConf = JSON.parse(fs.readFileSync(tauriConfPath, "utf8"));
          tauriConf.version = nextVersion;
          fs.writeFileSync(tauriConfPath, JSON.stringify(tauriConf, null, 2) + "\n");

          const cargoToml = fs.readFileSync(cargoTomlPath, "utf8");
          const nextCargo = cargoToml.replace(
            /(^version\s*=\s*")[^"]+(")/m,
            `$1${nextVersion}$2`
          );
          if (cargoToml === nextCargo) {
            throw new Error("Failed to update src-tauri/Cargo.toml version");
          }
          fs.writeFileSync(cargoTomlPath, nextCargo);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${nextVersion}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=v${nextVersion}\n`);
          EOF
        env:
          BUMP_TYPE: ${{ inputs.bump }}

      - name: Build frontend
        run: pnpm build

      - name: Build Windows bundles
        run: pnpm tauri build

      - name: Commit and tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"
          git tag ${{ steps.bump.outputs.tag }}
          git push origin HEAD
          git push origin ${{ steps.bump.outputs.tag }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: |
            src-tauri/target/release/bundle/msi/*
            src-tauri/target/release/bundle/nsis/*
          if-no-files-found: warn

  macos-package:
    if: ${{ always() && inputs.build_macos && (needs.windows-release.result == 'success' || needs.windows-release.result == 'skipped') }}
    runs-on: macos-latest
    needs:
      - windows-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_windows && needs.windows-release.outputs.tag || inputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build macOS bundles
        run: pnpm tauri build

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: |
            src-tauri/target/release/bundle/dmg/*
            src-tauri/target/release/bundle/macos/*
          if-no-files-found: warn

  publish-release:
    if: ${{ always() && inputs.create_release && inputs.build_windows && (needs.windows-release.result == 'success') && (needs.macos-package.result == 'success' || needs.macos-package.result == 'skipped') }}
    runs-on: ubuntu-latest
    needs:
      - windows-release
      - macos-package
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: "*-bundle"
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.windows-release.outputs.tag }}
          name: ${{ needs.windows-release.outputs.tag }}
          files: release-artifacts/*
